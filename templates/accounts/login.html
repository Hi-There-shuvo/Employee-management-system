{% extends 'base.html' %}

{% block login_content %}
<div class="login-wrapper">
    <div class="login-card">
        <div class="text-center mb-4">
            <i class="bi bi-building-gear" style="font-size: 2.5rem; color: #4361ee;"></i>
            <h2 class="mt-2">Welcome Back</h2>
            <p class="subtitle">Sign in to your EMS account</p>
        </div>

        {% if form.errors %}
        <div class="alert alert-danger">
            <i class="bi bi-exclamation-triangle"></i> Invalid username or password.
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-semibold">Username</label>
                {{ form.username }}
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Password</label>
                {{ form.password }}
            </div>
            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-box-arrow-in-right"></i> Sign In
            </button>
        </form>
    </div>
</div>
{% endblock %}
